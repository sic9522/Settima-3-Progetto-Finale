<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settima 3 progetto finale</title>
    <link rel="stylesheet" href="assets/css/style.css" type="text/css">
</head>

<body>
    <header>
        <div class="inizio">
            <h1>I miei Giochi</h1>
            <p>Aggiungi i giochi a cui hai giocato o vorresti giocare</p>
        </div>
    </header>
    <main>
        <div class="aggiungi">
            <h2>Aggiungi un gioco</h2>
            <form>
                <input type="text" placeholder="Titolo gioco" id="titoloGioco">
                <input type="text" placeholder="Produttore" id="produttore">
                <input type="text" placeholder="Genere" id="genere">
                <select name="" id="">
                    <option value="nuoviGiochi">Nuovi giochi</option>
                    <option value="giocato">Giocato</option>
                    <option value="daGiocare">Da giocare</option>
                </select>
                <button type="submit">Aggiungi</button>
            </form>
        </div>
    </main>


    <script src="assets/javascript/script.js"></script>
</body>

</html>
